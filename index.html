                title: '联系方式',
                content: `<p>学校总机：0518-85895000</p>
    <p>招生办：0518-85802843</p>`,
              },
            ],
          },
          faq: {
            title: '常见问题',
            qas: [
              { q: '苍梧宿舍怎么分？A/B/D区哪个好？', a: 'A区女生四人间有独卫（公共淋浴），B区男生4-6人间，D区四人间上床下桌+室内淋浴（条件最好但距离教学区远在马路对面）。看学院分配。' },
              { q: 'D区在马路对面吗？有独立淋浴吗？', a: '是的，D区在校外马路对面（出3号门进4号门），两宿舍共用一套卫浴，可室内淋浴，条件最好。有独立的D区食堂。' },
              { q: '教室没空调怎么办？', a: '苍梧多数教室确实没空调，夏季注意防暑。可带小风扇，选座位选靠窗通风处。图书馆和宿舍有空调。' },
              { q: '苍梧有几个食堂？推荐什么？', a: '6个：一至四食堂+海洋主题餐厅+民族餐厅+D区食堂。推荐二食堂香锅/海鲜面、四食堂石锅拌饭、三食堂5元馄饨。' },
              { q: '万达怎么走？多远？', a: '从3号门出，步行约18分钟（1.3公里）。也可打车或骑共享电瓶车。是苍梧学生周末聚餐主要去处。' },
              { q: '苍梧校区怎么不迷路？', a: '记住：2号门进直走大广场，北面女生A区；第一个路口右转古茗奶茶→一食堂/B区；大广场西南角三/四食堂；3号门出过马路D区。' },
              { q: '快递站在哪里？', a: '校内有菜鸟驿站，也有京东和顺丰快递点。凭取件码取件。' },
              { q: '苍梧有健身房吗？', a: '有！操场旁边就有健身房，学生价格便宜。' },
              { q: '学校有共享电瓶车吗？', a: '有的！校内共享电瓶车，扫码即用，日常上课非常方便。这在全国高校中都比较少见。' },
              { q: '社团百团大战什么时候？', a: '一般在开学后1-2周，在苍梧校区大广场或运动场举行。选1-2个感兴趣的参加即可，别贪多。' },
              { q: '宿舍门禁几点？用电有限制吗？', a: '门禁晚上22:30。宿舍不断电，但不允许使用大功率违规电器。空调单独充值使用。' },
              { q: '从火车站/高铁站怎么到苍梧？', a: '连云港站→苍梧：打车约15-20分钟，约20元。也可乘公交车。' },
            ],
          },
        },
        services: [
          { name: '二手电瓶车', desc: '校区交通必备，毕业生转让价优', contact: '联系微信号' },
          { name: '驾校报名', desc: '校内合作驾校，学生优惠价', contact: '联系微信号' },
          { name: '线上课程', desc: '学习资料和备考经验分享', contact: '联系微信号' },
        ],
      },
    };

    // Common FAQ for both campuses
    const commonFAQ = [
      { q: '校园卡怎么用？', a: '食堂消费、图书馆借书、门禁通行。支付宝绑定后可扫码支付，推荐使用。' },
      { q: '选课怎么选？', a: '通过学校教务系统选课，每学期20-30学分，最高36。热门课要抢，关注教务处通知。' },
      { q: '转专业条件？', a: '入学后咨询学院，一般有成绩排名和申请时间窗口要求，具体各学院政策不同。' },
      { q: '空调怎么充值？', a: '到所在宿舍楼下指定机器充值，具体操作看机器说明或问宿管。' },
      { q: '宿舍用品要自带吗？', a: '床铺0.9×2.0米，被褥可自带或到校购买（公寓用品450元/套，自愿）。洗漱用品建议自带或到校买。' },
    ];

    // --- Core Functions ---

    function switchCampus(campus) {
      currentCampus = campus;
      document.documentElement.setAttribute('data-campus', campus);
      localStorage.setItem('campus', campus);

      // Update tab styles
      document.querySelectorAll('.campus-tab').forEach(tab => {
        const isActive = tab.dataset.campus === campus;
        tab.className = `campus-tab flex-1 py-3 text-center text-sm font-medium transition-colors ${
          isActive
            ? 'border-b-2 font-semibold'
            : 'text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200'
        }`;
        if (isActive) {
          tab.style.color = 'var(--c-primary)';
          tab.style.borderColor = 'var(--c-primary)';
        } else {
          tab.style.borderColor = 'transparent';
        }
      });

      renderPage(currentPage);
    }

    function renderPage(pageId) {
      const data = guideData[currentCampus];
      const container = document.getElementById('pageContent');

      if (pageId === 'home') {
        renderHome(data, container);
      } else if (pageId === 'faq') {
        renderFAQ(data, container, pageId);
      } else {
        renderSubPages(data, container, pageId);
      }

      currentPage = pageId;
      updateActiveNav(pageId);
      updateSidebarNav(pageId);
      lucide.createIcons();
    }

    function renderHome(data, container) {
      const themeClass = currentCampus === 'tongguan' ? 'from-orange-50 to-amber-50' : 'from-blue-50 to-indigo-50';
      const themeClassDark = currentCampus === 'tongguan' ? 'dark:from-orange-950 dark:to-amber-950' : 'dark:from-blue-950 dark:to-indigo-950';

      container.innerHTML = `
        <!-- Hero -->
        <div class="rounded-2xl p-6 md:p-10 mb-6 bg-gradient-to-br ${themeClass} ${themeClassDark}">
          <h1 class="text-2xl md:text-3xl font-bold" style="color: var(--c-primary);">${data.name}</h1>
          <p class="mt-2 text-gray-600 dark:text-gray-300">${data.address}</p>
          <div class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3">
            ${data.quickLinks.map(l => `
              <div class="bg-white/80 dark:bg-gray-800/80 rounded-xl p-3 text-center hover:shadow-md transition-shadow cursor-pointer">
                <i data-lucide="${l.icon}" class="mx-auto" style="color: var(--c-primary);" width="24" height="24"></i>
                <p class="mt-1 font-medium text-sm">${l.label}</p>
                <p class="text-xs text-gray-500 dark:text-gray-400">${l.desc}</p>
              </div>
            `).join('')}
          </div>
        </div>
        <!-- Campus intro -->
        <div class="prose dark:prose-invert max-w-none">
          ${data.pages.home.content}
        </div>
      `;
    }

    function renderSubPages(data, container, pageId) {
      const page = data.pages[pageId];
      const subPages = page.pages || [];

      container.innerHTML = `
        <h2 class="text-xl font-bold mb-4" style="color: var(--c-primary);">${page.title}</h2>
        <div class="space-y-4">
          ${subPages.map((sub, i) => `
            <details class="group bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden theme-transition">
              <summary class="flex items-center justify-between p-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-750 font-medium">
                <span class="flex items-center gap-2">
                  <span class="w-6 h-6 rounded-full flex items-center justify-center text-white text-xs font-bold" style="background: var(--c-primary);">${i + 1}</span>
                  ${sub.title}
                </span>
                <i data-lucide="chevron-down" class="w-5 h-5 transition-transform group-open:rotate-180" style="color: var(--c-primary);"></i>
              </summary>
              <div class="px-4 pb-4 prose dark:prose-invert max-w-none text-sm">
                ${sub.content}
              </div>
            </details>
          `).join('')}
        </div>
      `;
    }

    function renderFAQ(data, container, pageId) {
      const page = data.pages[pageId];
      let allQAs = [...page.qas];
      // Append common FAQs
      allQAs = allQAs.concat(commonFAQ);

      container.innerHTML = `
        <h2 class="text-xl font-bold mb-4" style="color: var(--c-primary);">${page.title}</h2>
        <div class="space-y-3">
          ${allQAs.map((item, i) => `
            <details class="group bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden theme-transition">
              <summary class="flex items-center justify-between p-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-750 font-medium text-sm">
                <span class="flex items-center gap-2">
                  <span class="flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-white text-xs" style="background: var(--c-primary);">Q</span>
                  ${item.q}
                </span>
                <i data-lucide="chevron-down" class="w-5 h-5 transition-transform group-open:rotate-180 flex-shrink-0 ml-2" style="color: var(--c-primary);"></i>
              </summary>
              <div class="px-4 pb-4 text-sm text-gray-600 dark:text-gray-300 leading-relaxed">
                <span class="font-medium" style="color: var(--c-primary);">A：</span>${item.a}
              </div>
            </details>
          `).join('')}
        </div>
      `;
    }

    function updateActiveNav(pageId) {
      // Update bottom nav only — preserves sidebar button layout classes
      document.querySelectorAll('#bottomNav .nav-btn').forEach(btn => {
        const isActive = btn.dataset.page === pageId;
        btn.className = `nav-btn flex flex-col items-center gap-0.5 px-3 py-1 text-xs transition-colors ${
          isActive ? 'font-semibold' : 'text-gray-500 dark:text-gray-400'
        }`;
        btn.style.color = isActive ? 'var(--c-primary)' : '';
      });
    }

    function updateSidebarNav(pageId) {
      // Update sidebar nav buttons — preserves w-full, flex items-center, gap-3, px-3 py-2, rounded-lg layout
      document.querySelectorAll('#sidebarNav .nav-btn').forEach(btn => {
        const isActive = btn.dataset.page === pageId;
        btn.className = `nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors text-left ${
          isActive ? 'font-semibold bg-gray-100 dark:bg-gray-800' : 'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'
        }`;
        btn.style.color = isActive ? 'var(--c-primary)' : '';
      });
    }

    let currentPage = 'home';

    // --- Init ---
    document.addEventListener('DOMContentLoaded', function() {
      // Dark mode
      const darkToggle = document.getElementById('darkToggle');
      if (darkToggle) {
        // Check stored preference
        if (localStorage.getItem('darkMode') === 'true' ||
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }

        darkToggle.addEventListener('click', () => {
          document.documentElement.classList.toggle('dark');
          localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
          // Toggle icon
          const icon = darkToggle.querySelector('i');
          if (icon) {
            icon.setAttribute('data-lucide', document.documentElement.classList.contains('dark') ? 'sun' : 'moon');
            lucide.createIcons();
          }
        });
      }

      // Render campus tabs
      document.querySelectorAll('.campus-tab').forEach(tab => {
        tab.addEventListener('click', () => switchCampus(tab.dataset.campus));
      });

      // Apply initial campus
      document.documentElement.setAttribute('data-campus', currentCampus);
      switchCampus(currentCampus);

      // Render bottom nav
      const navContainer = document.getElementById('bottomNav');
      if (navContainer) {
        navContainer.innerHTML = NAV.map(n => `
          <button class="nav-btn flex flex-col items-center gap-0.5 px-3 py-1 text-xs text-gray-500 dark:text-gray-400 transition-colors" data-page="${n.id}">
            <i data-lucide="${n.icon}" width="20" height="20"></i>
            <span>${n.label}</span>
          </button>
        `).join('');

        document.querySelectorAll('.nav-btn').forEach(btn => {
          btn.addEventListener('click', () => renderPage(btn.dataset.page));
        });
      }

      // Sidebar nav
      const sidebarNav = document.getElementById('sidebarNav');
      if (sidebarNav) {
        sidebarNav.innerHTML = NAV.map(n => `
          <button class="nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors hover:bg-gray-100 dark:hover:bg-gray-800 text-left" data-page="${n.id}">
            <i data-lucide="${n.icon}" width="18" height="18" style="color: var(--c-primary);"></i>
            <span>${n.label}</span>
          </button>
        `).join('');

        sidebarNav.querySelectorAll('.nav-btn').forEach(btn => {
          btn.addEventListener('click', () => renderPage(btn.dataset.page));
        });
      }

      // Ad popup logic
      let adCountdown = 2;
      function showAd() {
        const overlay = document.getElementById('adOverlay');
        overlay.classList.add('active');
        adCountdown = 2;
        document.getElementById('adTimer').textContent = '2秒后可关闭';
        document.getElementById('adCloseBtn').classList.remove('active');

        const timer = setInterval(() => {
          adCountdown--;
          document.getElementById('adTimer').textContent = adCountdown > 0 ? adCountdown + '秒后可关闭' : '可关闭';
          if (adCountdown <= 0) {
            clearInterval(timer);
            document.getElementById('adCloseBtn').classList.add('active');
          }
        }, 1000);
      }

      function closeAd() {
        document.getElementById('adOverlay').classList.remove('active');
      }
      document.getElementById('adCloseBtn').addEventListener('click', closeAd);

      // Loading animation with progress bar
      let loadProgress = 0;
      const loadingBar = document.getElementById('loadingBar');
      const loadInterval = setInterval(() => {
        loadProgress += Math.random() * 15 + 5;
        if (loadProgress >= 100) {
          loadProgress = 100;
          clearInterval(loadInterval);
          setTimeout(() => {
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            showAd();
          }, 300);
        }
        loadingBar.style.width = Math.min(loadProgress, 100) + '%';
      }, 150);

      lucide.createIcons();
      updateActiveNav('home');
      updateSidebarNav('home');
    });
  </script>
</body>
</html>
